apiVersion: apps/v1
kind: Deployment
metadata:
  name: coach-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coach
  template:
    metadata:
      labels:
        app: coach
    spec:
      hostAliases:
      - ip: "192.168.64.1"
        hostnames:
        - "host.minikube.internal"
      containers:
      - name: coach
        image: habitual-coach:latest
        ports:
        - containerPort: 3004
        envFrom:
        - configMapRef:
            name: habitual-config
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"
        volumeMounts:
        - name: coach-data
          mountPath: /app/data
      volumes:
      - name: coach-data
        persistentVolumeClaim:
          claimName: coach-pvc
---
