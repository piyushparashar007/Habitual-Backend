apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: habitual-gateway:latest
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: habitual-config
        env:
        - name: DATABASE_URL
          value: "postgres://habitual_user:Password123@habitual-db-endpoint:5432/habitual"
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
  - protocol: TCP
    port: 3002
    targetPort: 3002
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
    spec:
      containers:
      - name: users
        image: habitual-users:latest
        ports:
        - containerPort: 3001
        envFrom:
        - secretRef:
            name: habitual-secrets
        env:
        - name: DATABASE_URL
          value: "postgres://habitual_user:Password123@habitual-db-endpoint:5432/habitual"
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "250m"
        volumeMounts:
        - name: users-data
          mountPath: /app/data
      volumes:
      - name: users-data
        persistentVolumeClaim:
          claimName: users-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: users-service
spec:
  selector:
    app: users
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
