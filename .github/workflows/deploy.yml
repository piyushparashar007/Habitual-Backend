name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Private Registry
      uses: docker/login-action@v2
      with:
        registry: my-private-registry.io
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and Push Gateway
      uses: docker/build-push-action@v4
      with:
        context: ./gateway
        push: true
        tags: my-private-registry.io/habitual/gateway:latest

    - name: Build and Push Users
      uses: docker/build-push-action@v4
      with:
        context: ./users
        push: true
        tags: my-private-registry.io/habitual/users:latest

    - name: Build and Push Activities
      uses: docker/build-push-action@v4
      with:
        context: ./activities
        push: true
        tags: my-private-registry.io/habitual/activities:latest

    - name: Build and Push Coach
      uses: docker/build-push-action@v4
      with:
        context: ./coach
        push: true
        tags: my-private-registry.io/habitual/coach:latest

    - name: Build and Push Recommendations
      uses: docker/build-push-action@v4
      with:
        context: ./recommendations
        push: true
        tags: my-private-registry.io/habitual/recommendations:latest

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBECONFIG }}

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/secret.yaml
        kubectl apply -f k8s/deployments.yaml
        kubectl rollout restart deployment/gateway-deployment
        kubectl rollout restart deployment/users-deployment
        kubectl rollout restart deployment/activities-deployment
        kubectl rollout restart deployment/coach-deployment
        kubectl rollout restart deployment/recommendations-deployment
