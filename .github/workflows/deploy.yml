name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Habitual-Backend/**'
      - 'Habitual-Backend/.github/workflows/**'

jobs:
  # 1. TEST PHASE
  test-gateway:
    uses: ./.github/workflows/module-test-node.yml
    with:
      service_path: Habitual-Backend/gateway

  test-users:
    uses: ./.github/workflows/module-test-node.yml
    with:
      service_path: Habitual-Backend/users

  test-activities:
    uses: ./.github/workflows/module-test-node.yml
    with:
      service_path: Habitual-Backend/activities

  test-coach:
    uses: ./.github/workflows/module-test-python.yml
    with:
      service_path: Habitual-Backend/coach

  test-recommendations:
    uses: ./.github/workflows/module-test-python.yml
    with:
      service_path: Habitual-Backend/recommendations

  # 2. BUILD PHASE (Only if tests pass)
  build-gateway:
    needs: test-gateway
    uses: ./.github/workflows/module-build-docker.yml
    with:
      service_name: gateway
      context_path: Habitual-Backend/gateway
    secrets: inherit

  build-users:
    needs: test-users
    uses: ./.github/workflows/module-build-docker.yml
    with:
      service_name: users
      context_path: Habitual-Backend/users
    secrets: inherit

  build-activities:
    needs: test-activities
    uses: ./.github/workflows/module-build-docker.yml
    with:
      service_name: activities
      context_path: Habitual-Backend/activities
    secrets: inherit

  build-coach:
    needs: test-coach
    uses: ./.github/workflows/module-build-docker.yml
    with:
      service_name: coach
      context_path: Habitual-Backend/coach
    secrets: inherit

  build-recommendations:
    needs: test-recommendations
    uses: ./.github/workflows/module-build-docker.yml
    with:
      service_name: recommendations
      context_path: Habitual-Backend/recommendations
    secrets: inherit

  # 3. DEPLOY PHASE (Only if all builds succeed)
  deploy:
    needs: [build-gateway, build-users, build-activities, build-coach, build-recommendations]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}
      - name: Update Manifests & Apply
        run: |
          # Use the registry URI to update image tags in deployments
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          sed -i "s|image: habitual-|image: $REGISTRY/habitual-|g" Habitual-Backend/k8s/deployments.yaml
          
          kubectl apply -f Habitual-Backend/k8s/pvc.yaml
          kubectl apply -f Habitual-Backend/k8s/configmap.yaml
          kubectl apply -f Habitual-Backend/k8s/secret.yaml
          kubectl apply -f Habitual-Backend/k8s/deployments.yaml
          
          # Force restart to pull new images if using :latest
          kubectl rollout restart deployment/gateway-deployment
          kubectl rollout restart deployment/users-deployment
          kubectl rollout restart deployment/activities-deployment
          kubectl rollout restart deployment/coach-deployment
          kubectl rollout restart deployment/recommendations-deployment
