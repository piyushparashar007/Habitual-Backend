name: Docker Build & Push Module

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      context_path:
        required: true
        type: string
    outputs:
      image_tag:
        description: "The full ECR image tag"
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.login-ecr.outputs.registry }}/habitual-${{ inputs.service_name }}:latest
    steps:
      - uses: actions/checkout@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      - name: Build and Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: habitual-${{ inputs.service_name }}
        run: |
          docker build -t $ECR_REGISTRY/$REPO:latest ${{ inputs.context_path }}
          docker push $ECR_REGISTRY/$REPO:latest
